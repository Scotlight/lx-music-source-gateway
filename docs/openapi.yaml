openapi: 3.0.3
info:
  title: 多平台音乐网关 API
  version: 0.5.3
  description: |
    **多平台音乐网关 API** 是一组用于聚合 QQ 音乐 / 网易云音乐 / 酷狗音乐等多家音乐源的统一 RESTful 接口。
    网关在内部完成账号池调度、限流配额、计费扣减、Extra Usage 超额计费、余额扣款等控制逻辑，
    上游应用只需要通过统一的 API 接入即可。

    ## 协议总览
    - **基础路径**：所有业务接口位于 `/v1/...` 命名空间下。
    - **认证方式**：
      - **Cookie 会话**（前端控制台用）：登录后服务器下发 `sid` 会话 Cookie。
      - **API Key**（程序化调用用）：在 `Authorization: Bearer <api_key>` 请求头中携带。
    - **响应封装**：网关接口绝大多数返回 `{ code, message, data }` 包装结构（`code = 0` 表示成功），
      详情见下方 `Response` schema 定义。
    - **CSRF 保护**：使用 Cookie 会话时，所有非 GET/HEAD/OPTIONS 请求都需要在请求头中携带
      `X-CSRF-Token`（值与 Cookie `csrf_token` 一致）。API Key 模式不受 CSRF 限制。
    - **限流模型**：
      - **QPS**：按用户套餐限制每秒请求数。
      - **每日 / 每月配额**：免费版默认 100 次/日；超出后若开启 Extra Usage 则会按千次价从余额中扣费。

    ## 错误码
    全局错误码定义在 `ErrorCode` 字段：
    | code | 含义 |
    | ---- | ---- |
    | 0 | 成功 |
    | 400 | 请求参数错误 |
    | 401 | 未认证 / 凭据失效 |
    | 403 | 权限不足 |
    | 404 | 资源不存在 |
    | 409 | 资源冲突（重复创建、版本冲突等） |
    | 429 | 限流（QPS 或日/月配额耗尽） |
    | 500 | 服务器内部错误 |
  contact:
    name: 多平台音乐网关
    url: https://github.com/luoye663/qqmusicapi
servers:
  - url: /
    description: 当前实例
  - url: https://api.example.com
    description: 生产环境（占位，按部署实际域名替换）
tags:
  - name: 认证
    description: 用户注册、登录、密码、二步验证 (TOTP)
  - name: API Key
    description: 程序化访问凭据的创建、查询、撤销
  - name: 套餐
    description: 套餐查询、订阅、当前套餐信息
  - name: 订单
    description: 订单创建、查询、退款（管理员）
  - name: 账户余额
    description: 钱包余额查询、充值、明细
  - name: Extra Usage
    description: 超额使用配置和扣费记录
  - name: 用量
    description: 用量统计、历史、实时数据
  - name: 音乐
    description: 多平台音乐统一接口（歌曲 / 搜索 / 专辑 / 歌手 / 歌单 / 直链 / 歌词）
  - name: 网易云登录
    description: 网易云原生账号登录（手机号 / 邮箱 / 二维码 / 验证码）
  - name: 支付回调
    description: 支付平台异步通知（公网可访问）
  - name: 系统
    description: 健康检查与系统级接口
security:
  - cookieAuth: []
  - apiKeyAuth: []
paths:
  /healthz:
    get:
      tags:
        - 系统
      summary: 健康检查
      description: 网关是否启动并接收请求。
      security: []
      responses:
        '200':
          description: 服务正常
          content:
            text/plain:
              schema:
                type: string
                example: ok
  /readyz:
    get:
      tags:
        - 系统
      summary: 就绪检查
      description: 网关是否已经完成依赖（数据库、缓存等）初始化。
      security: []
      responses:
        '200':
          description: 服务就绪
          content:
            text/plain:
              schema:
                type: string
                example: ready
  /v1/auth/register:
    post:
      tags:
        - 认证
      summary: 注册新用户
      description: 创建账户。注册成功后默认 `free` 套餐；密码强度由服务端校验。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: 邮箱已被占用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /v1/auth/login:
    post:
      tags:
        - 认证
      summary: 用户登录
      description: 校验邮箱 / 密码，下发会话 Cookie。若开启了 TOTP 则需带上验证码。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功，会话 Cookie 已下发
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponseEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/auth/logout:
    post:
      tags:
        - 认证
      summary: 退出登录
      description: 销毁当前会话并清除 Cookie。
      responses:
        '200':
          description: 退出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
  /v1/auth/me:
    get:
      tags:
        - 认证
      summary: 获取当前登录用户
      responses:
        '200':
          description: 当前用户信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/auth/password/change:
    post:
      tags:
        - 认证
      summary: 修改密码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/auth/password/reset/request:
    post:
      tags:
        - 认证
      summary: 申请重置密码（发送重置链接）
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  description: 注册邮箱
      responses:
        '200':
          description: 已发送重置邮件
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
  /v1/auth/password/reset:
    post:
      tags:
        - 认证
      summary: 使用重置令牌设置新密码
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
              properties:
                token:
                  type: string
                  description: 重置令牌
                newPassword:
                  type: string
                  format: password
                  minLength: 8
      responses:
        '200':
          description: 已重置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/auth/email/verify:
    post:
      tags:
        - 认证
      summary: 校验邮箱验证码
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: 邮箱验证 token
      responses:
        '200':
          description: 邮箱已验证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
  /v1/auth/totp/enable:
    post:
      tags:
        - 认证
      summary: 开启二步验证（TOTP）
      description: 返回 OTPAuth URI / 二维码，用户使用 Google Authenticator 等扫码绑定。
      responses:
        '200':
          description: 已生成 TOTP 绑定信息（需后续 Verify 才会真正生效）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TOTPEnableEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/auth/totp/verify:
    post:
      tags:
        - 认证
      summary: 校验 TOTP 验证码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  description: 6 位验证码
      responses:
        '200':
          description: 校验通过
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TOTPResultEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/auth/totp/disable:
    post:
      tags:
        - 认证
      summary: 关闭二步验证
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
      responses:
        '200':
          description: 已关闭
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/auth/api-keys:
    get:
      tags:
        - API Key
      summary: 列出当前用户的 API Key
      responses:
        '200':
          description: API Key 列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKeyListEnvelope'
    post:
      tags:
        - API Key
      summary: 创建 API Key
      description: 创建后**只在本次响应中**返回完整 Key 明文，请妥善保存。新 Key 的套餐继承用户当前套餐。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAPIKeyRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAPIKeyResponseEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/auth/api-keys/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: API Key ID（不是 Key 明文）
    get:
      tags:
        - API Key
      summary: 获取单个 API Key 元信息
      responses:
        '200':
          description: API Key 详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKeyEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - API Key
      summary: 更新 API Key 名称 / 备注 / 限流 / 过期时间
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAPIKeyRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKeyEnvelope'
    delete:
      tags:
        - API Key
      summary: 注销 API Key
      description: 软删除，撤销后无法再恢复。
      responses:
        '200':
          description: 注销成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/auth/api-keys/{id}/enabled:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags:
        - API Key
      summary: 启用 / 停用 API Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - enabled
              properties:
                enabled:
                  type: boolean
      responses:
        '200':
          description: 状态已更新
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
  /v1/billing/plans:
    get:
      tags:
        - 套餐
      summary: 列出所有可订阅套餐
      security: []
      responses:
        '200':
          description: 套餐列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanListEnvelope'
    put:
      tags:
        - 套餐
      summary: 创建 / 更新套餐（管理员）
      x-internal: true
      responses:
        '200':
          description: 已写入
  /v1/billing/plans/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    put:
      tags:
        - 套餐
      summary: 更新指定套餐（管理员）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Plan'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanEnvelope'
    delete:
      tags:
        - 套餐
      summary: 删除套餐（管理员）
      responses:
        '200':
          description: 已删除
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
  /v1/billing/me/plan:
    get:
      tags:
        - 套餐
      summary: 获取当前用户的套餐与限额
      description: 返回用户当前生效的套餐 ID、QPS、每日/每月限额、Extra Usage 价格等。
      responses:
        '200':
          description: 我的套餐
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyPlanEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/billing/orders:
    get:
      tags:
        - 订单
      summary: 列出当前用户订单
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: 订单列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListEnvelope'
    post:
      tags:
        - 订单
      summary: 创建订单（订阅 / 充值）
      description: |
        - 订阅：传 `planId`，订单类型为 `subscription`，支付成功后会升级用户套餐并将其下所有 API Key 切换到该套餐。
        - 充值：传 `topupAmountCents`，订单类型为 `topup`，支付成功后金额自动入账到用户钱包。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '200':
          description: 订单已创建，含支付链接
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/billing/orders/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags:
        - 订单
      summary: 查询订单
      responses:
        '200':
          description: 订单详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/billing/orders/{id}/refund:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags:
        - 订单
      summary: 退款（管理员）
      description: 仅 `admin` / `super_admin` 角色可用。
      responses:
        '200':
          description: 退款发起成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderEnvelope'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/billing/balance:
    get:
      tags:
        - 账户余额
      summary: 查询当前用户余额
      responses:
        '200':
          description: 余额
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/billing/balance/transactions:
    get:
      tags:
        - 账户余额
      summary: 查询余额变动明细
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 500
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: 余额变动列表（按时间倒序）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceTxnListEnvelope'
  /v1/billing/balance/topup:
    post:
      tags:
        - 账户余额
      summary: 发起充值（生成支付链接）
      description: |
        创建一个用途为 `topup` 的订单。支付成功后，金额由网关在回调中自动入账到余额。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopupRequest'
      responses:
        '200':
          description: 已生成支付订单
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/billing/balance/adjust:
    post:
      tags:
        - 账户余额
      summary: 内部 / 管理员手工调整余额
      description: |
        通常仅供运营 / 自动化任务使用，按 `operation` 进行 `credit` / `debit` / `set` 操作；
        会写入一条变动明细。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BalanceAdjustRequest'
      responses:
        '200':
          description: 调整成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceEnvelope'
  /v1/billing/extra-usage:
    get:
      tags:
        - Extra Usage
      summary: 获取当前用户的 Extra Usage 配置
      responses:
        '200':
          description: 配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtraUsageSettingsEnvelope'
    put:
      tags:
        - Extra Usage
      summary: 更新 Extra Usage 配置
      description: |
        - `enabled` 为 `true` 时，月度 / 每日配额耗尽后将按 `overagePricePer1k` 从余额中扣费。
        - `monthlyCapCents` 设置月度超额上限（防意外大额扣费），0 表示不设上限。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExtraUsageRequest'
      responses:
        '200':
          description: 已更新
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtraUsageSettingsEnvelope'
  /v1/billing/extra-usage/report:
    get:
      tags:
        - Extra Usage
      summary: 获取本月超额报表
      responses:
        '200':
          description: 报表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtraUsageReportEnvelope'
  /v1/billing/extra-usage/charges:
    get:
      tags:
        - Extra Usage
      summary: 列出超额扣费聚合（按月）
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 12
            maximum: 60
      responses:
        '200':
          description: 月度聚合列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverageChargesEnvelope'
  /v1/billing/extra-usage/events:
    get:
      tags:
        - Extra Usage
      summary: 列出超额扣费事件明细
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 500
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: 事件明细
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverageEventsEnvelope'
  /v1/usage/summary:
    get:
      tags:
        - 用量
      summary: 用量汇总（今日 / 本月 / 累计）
      responses:
        '200':
          description: 汇总
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageSummaryEnvelope'
  /v1/usage/history:
    get:
      tags:
        - 用量
      summary: 历史用量（按日聚合）
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
            maximum: 365
      responses:
        '200':
          description: 历史用量
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageHistoryEnvelope'
  /v1/usage/realtime:
    get:
      tags:
        - 用量
