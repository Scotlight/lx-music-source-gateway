              $ref: '#/components/schemas/NeteaseCellphoneLogin'
      responses:
        '200':
          $ref: '#/components/responses/RawJSON'
  /v1/netease/auth/login/email:
    post:
      tags:
        - 网易云登录
      summary: 邮箱登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NeteaseEmailLogin'
      responses:
        '200':
          $ref: '#/components/responses/RawJSON'
  /v1/netease/auth/login/qr/key:
    post:
      tags:
        - 网易云登录
      summary: 获取二维码 key
      responses:
        '200':
          $ref: '#/components/responses/RawJSON'
  /v1/netease/auth/login/qr/create:
    post:
      tags:
        - 网易云登录
      summary: 创建二维码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
