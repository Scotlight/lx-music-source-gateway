          application/json:
            schema:
              type: object
              required:
                - phone
              properties:
                phone:
                  type: string
                countryCode:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/RawJSON'
  /v1/netease/auth/captcha/verify:
    post:
      tags:
        - 网易云登录
      summary: 校验短信验证码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
                - captcha
              properties:
                phone:
                  type: string
                captcha:
                  type: string
                countryCode:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/RawJSON'
  /v1/billing/callback/yipay:
    get:
      tags:
        - 支付回调
      summary: 易支付异步通知（GET）
      security: []
      x-callback: true
      responses:
        '200':
          description: 已接收
    post:
      tags:
        - 支付回调
      summary: 易支付异步通知（POST）
      security: []
      x-callback: true
      responses:
        '200':
          description: 已接收
  /v1/billing/callback/hupijiao:
    post:
      tags:
        - 支付回调
      summary: 虎皮椒异步通知
      security: []
      x-callback: true
      responses:
        '200':
          description: 已接收
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sid
      description: 通过 `/v1/auth/login` 颁发的会话 Cookie，浏览器自动携带；同源调用无需手动配置。
    apiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: '在 `Authorization: Bearer <api_key>` 中携带。'
  parameters:
    Provider:
      name: provider
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Provider'
      description: 上游音乐源标识。
  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: 未认证
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: 权限不足
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    RateLimited:
      description: 触发限流（QPS / 每日 / 每月配额耗尽）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    RawJSON:
      description: 直接透传上游返回，未做封装
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
  schemas:
    Response:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 0
          description: 0=成功；非 0 见错误码表
        message:
          type: string
          example: ok
        data:
          description: 实际业务数据，类型见各接口
    ErrorEnvelope:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          example:
            code: 400
            message: invalid body
            data: null
    EmptyEnvelope:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            data:
              type: object
              additionalProperties: true
    Provider:
      type: string
      enum:
        - qqmusic
        - netease
        - kugou
      description: 音乐源
    AudioQuality:
      type: string
      enum:
        - MP3_128
        - MP3_320
        - FLAC
        - ATMOS
        - ATMOS2
      description: 音质标签
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum:
            - active
            - locked
            - disabled
        role:
          type: string
          enum:
            - user
            - admin
            - super_admin
        planId:
          type: string
          example: free
        totpEnabled:
          type: boolean
        emailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
    UserEnvelope:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/User'
    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    RegisterResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            data:
              type: object
              properties:
                user:
                  $ref: '#/components/schemas/User'
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        totpCode:
          type: string
          description: 当用户开启 TOTP 时必填
    LoginResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            data:
              type: object
              properties:
                user:
                  $ref: '#/components/schemas/User'
                csrfToken:
                  type: string
    ChangePasswordRequest:
      type: object
      required:
        - oldPassword
        - newPassword
      properties:
        oldPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
    TOTPEnableEnvelope:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            data:
              type: object
              properties:
                otpauthUri:
                  type: string
                qrPng:
                  type: string
                  description: Data URI 形式的二维码 PNG（可选）
    TOTPResultEnvelope:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            data:
              type: object
              properties:
                verified:
                  type: boolean
    APIKey:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        prefix:
          type: string
          description: 仅返回前缀，明文 Key 只在创建时给一次
        planId:
          type: string
        status:
          type: string
          enum:
            - active
            - disabled
        scopes:
          type: array
          items:
            type: string
        ipAllowlist:
          type: array
          items:
            type: string
        rateLimitRpm:
          type: integer
          nullable: true
        rateLimitDaily:
          type: integer
          format: int64
          nullable: true
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
    APIKeyEnvelope:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/APIKey'
    APIKeyListEnvelope:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            data:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/APIKey'
                total:
                  type: integer
    CreateAPIKeyRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 64
        description:
          type: string
        scopes:
          type: array
          items:
            type: string
        ipAllowlist:
          type: array
          items:
            type: string
        rateLimitRpm:
          type: integer
        rateLimitDaily:
          type: integer
          format: int64
        expiresAt:
          type: string
          format: date-time
    CreateAPIKeyResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            data:
              type: object
              properties:
                key:
                  type: string
                  description: 完整明文 Key（只此一次）
                record:
                  $ref: '#/components/schemas/APIKey'
    UpdateAPIKeyRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        scopes:
          type: array
          items:
            type: string
        ipAllowlist:
          type: array
          items:
            type: string
        rateLimitRpm:
          type: integer
        rateLimitDaily:
          type: integer
          format: int64
        expiresAt:
          type: string
          format: date-time
          nullable: true
    Plan:
      type: object
      properties:
        id:
          type: string
          example: enterprise
        code:
          type: string
        name:
          type: string
          example: 企业版
        priceCents:
          type: integer
          format: int64
        currency:
          type: string
          default: CNY
        period:
          type: string
          enum:
            - monthly
            - yearly
            - none
        qps:
          type: integer
        dailyLimit:
          type: integer
          format: int64
        monthlyLimit:
          type: integer
          format: int64
        softLimitPct:
          type: number
          format: float
          description: 0-1 之间的预警阈值
        payAsYouGo:
          type: boolean
        overagePricePer_1k:
          type: number
          format: float
          description: 超额单价：单位元/千次
    PlanEnvelope:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Plan'
    PlanListEnvelope:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            data:
              type: object
              properties:
                plans:
                  type: array
                  items:
                    $ref: '#/components/schemas/Plan'
    MyPlan:
      type: object
      properties:
        userId:
          type: string
        planId:
          type: string
        planName:
          type: string
        priceCents:
          type: integer
          format: int64
        currency:
          type: string
        period:
          type: string
        qps:
          type: integer
        dailyLimit:
          type: integer
          format: int64
        monthlyLimit:
          type: integer
          format: int64
        softLimitPct:
          type: number
          format: float
        payAsYouGo:
          type: boolean
        overagePricePer_1k:
          type: number
          format: float
    MyPlanEnvelope:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/MyPlan'
    Order:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        planId:
          type: string
          nullable: true
        purpose:
          type: string
          enum:
            - subscription
            - topup
        amount:
          type: string
          description: 金额字符串，单位元
        currency:
          type: string
        status:
          type: string
          enum:
            - pending
            - paid
            - refunded
            - failed
            - canceled
        paymentProvider:
          type: string
        payUrl:
          type: string
        paidAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
    OrderEnvelope:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Order'
    OrderListEnvelope:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            data:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/Order'
                total:
                  type: integer
    CreateOrderRequest:
      type: object
      properties:
        planId:
          type: string
          description: 套餐订阅时使用
        topupAmountCents:
          type: integer
          format: int64
          description: 充值时使用，单位分
        paymentProvider:
          type: string
          enum:
            - yipay
            - hupijiao
          default: yipay
        successUrl:
          type: string
          format: uri
          description: 用户支付完成跳转地址
    CreateOrderResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            data:
              type: object
              properties:
                orderId:
                  type: string
                payUrl:
                  type: string
                  format: uri
                amount:
                  type: string
                currency:
                  type: string
                status:
                  type: string
                planName:
                  type: string
                  nullable: true
    Balance:
      type: object
      properties:
        userId:
          type: string
        balanceCents:
          type: integer
          format: int64
        currency:
          type: string
          default: CNY
        version:
          type: integer
          format: int64
          description: 乐观锁版本号
        updatedAt:
          type: string
          format: date-time
    BalanceEnvelope:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Balance'
    BalanceTransaction:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        amountCents:
          type: integer
          format: int64
          description: 有符号；正为入账（充值/调整加），负为扣减（消费/调整减）
        balanceAfterCents:
          type: integer
          format: int64
        type:
          type: string
          enum:
            - topup
            - overage
            - refund
            - adjust_credit
            - adjust_debit
            - adjust_set
        description:
          type: string
        reference:
          type: string
          description: 关联订单/事件等外部 ID
        createdAt:
          type: string
          format: date-time
    BalanceTxnListEnvelope:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            data:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/BalanceTransaction'
                total:
                  type: integer
                limit:
                  type: integer
                offset:
                  type: integer
    TopupRequest:
      type: object
      required:
        - amountCents
      properties:
        amountCents:
          type: integer
          format: int64
          minimum: 100
        paymentProvider:
          type: string
          enum:
            - yipay
            - hupijiao
          default: yipay
        successUrl:
          type: string
          format: uri
    BalanceAdjustRequest:
      type: object
      required:
        - operation
        - amountCents
      properties:
        operation:
          type: string
          enum:
            - credit
            - debit
            - set
          description: credit=加，debit=减，set=覆盖
        amountCents:
          type: integer
          format: int64
        description:
          type: string
        reference:
          type: string
    ExtraUsageSettings:
      type: object
      properties:
        userId:
          type: string
        enabled:
          type: boolean
        monthlyCapCents:
          type: integer
          format: int64
          description: 0=不设上限
        currency:
          type: string
        updatedAt:
          type: string
          format: date-time
    ExtraUsageSettingsEnvelope:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ExtraUsageSettings'
    UpdateExtraUsageRequest:
      type: object
      properties:
        enabled:
          type: boolean
        monthlyCapCents:
          type: integer
          format: int64
    ExtraUsageReport:
      type: object
      properties:
        month:
          type: string
          example: 2026-05
        totalRequests:
          type: integer
          format: int64
        chargedRequests:
          type: integer
          format: int64
        chargedAmountCents:
          type: integer
          format: int64
        capCents:
          type: integer
          format: int64
        capRemainingCents:
          type: integer
          format: int64
    ExtraUsageReportEnvelope:
      allOf:
        - $ref: '#/components/schemas/Response'
        - type: object
          properties:
            data:
